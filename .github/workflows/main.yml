name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Bu tugma orqali o'zingiz ham xohlagan payt qo'lda buildni boshlay olasiz

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle' # Gradle keshlash tizimini yoqadi, shunda keyingi safar tezroq build bo'ladi

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Initialize Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper topilmadi. Yangitdan yaratilmoqda..."
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: English-AI-Master-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # Fayl GitHub'da 7 kun davomida yuklab olish uchun saqlanib turadi
