workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 21
    scripts:
      - name: Ultimate Build
        script: |
          # Gradle wrapper fayllarini 9.3.1 versiyada yaratamiz
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          
          # Buildni boshlaymiz
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
