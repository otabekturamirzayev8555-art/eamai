workflows:
  android-build:
    name: Android Production & Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      java: 21
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Validate Gradle & Java environment
        script: |
          echo "Checking system Java version..."
          java -version
          
      - name: Initialize Gradle Wrapper
        script: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found. Generating dynamically..."
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew

      - name: Build Android Debug APK
        script: |
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/*.apk
