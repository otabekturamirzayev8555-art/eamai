workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Build Android APK
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
