workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Force Build and Catch Error
        script: |
          echo "=== GRADLE WRAPPER GENERATION ===" > build_error.log
          gradle wrapper >> build_error.log 2>&1 || true
          
          echo "=== ANDROID BUILD PROCESS ===" >> build_error.log
          chmod +x gradlew || true
          ./gradlew assembleDebug >> build_error.log 2>&1 || true
    artifacts:
      - build_error.log
