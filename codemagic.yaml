workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Build Android APK
        script: |
          # Loyiha qaysi papkada bo'lsa, o'sha yerga o'tish va yig'ish
          cd $(dirname $(find . -name "build.gradle" -print -quit))
          chmod +x gradlew || true
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
