workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Debug Project Structure
        script: |
          echo "=== HOZIRGI PAPKADAGI FAYLLAR ==="
          ls -la
          echo "=== LOYIHA ICHIDAGI BARCHA PAPKALAR ==="
          find . -maxdepth 3 -type d
