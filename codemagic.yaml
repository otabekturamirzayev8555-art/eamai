workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    scripts:
      - name: Generate Wrapper and Build
        script: |
          # Serverning o'zidagi gradle orqali loyihaga wrapper fayllarini majburlab o'rnatamiz
          gradle wrapper
          # Endi wrapperga ruxsat berib, ishga tushiramiz
          chmod +x gradlew || true
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
