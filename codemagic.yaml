workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      vars:
        # Java 21 ga ko'taramiz, chunki Gradle 9.x shuni talab qiladi
        JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
    scripts:
      - name: Ultimate Build
        script: |
          # Gradle 9.3.1 ni majburiy o'rnatamiz
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          
          # Hozirgi Java versiyasini tekshirib, buildni boshlaymiz
          java -version
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
