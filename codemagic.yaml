workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      android_ndk: 25.2.9519653
      java: 21
    scripts:
      - name: Ultimate Build
        script: |
          # Gradle wrapper fayllarini talab qilingan 9.3.1 versiyada yaratamiz
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          
          # Build jarayonini boshlaymiz
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
